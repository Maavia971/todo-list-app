<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO Do List | Mavia Gulshan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="todo-wrapper">
        <h1>📋To-Do List</h1>
        <form id="taskForm" class="input-area">
            <input type="text" id="taskInput" placeholder="Add a new task..." autocomplete="off"/>
            <button id="addBtn" type="submit">Add</button>
        </form>
        <ul class="tasks" id="taskList"></ul>
        <div class="controls">
<button id="clearBtn" class="clear">Clear All</button>
<p class="note">&copy;2025 Mavia Gulshan</p>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
